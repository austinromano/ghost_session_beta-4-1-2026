name: Build Ghost Session

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-vst-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install JUCE
        run: git clone --depth 1 --branch 8.0.4 https://github.com/juce-framework/JUCE.git

      - name: Install dependencies
        run: brew install cmake

      - name: Configure CMake
        run: |
          cd apps/plugin
          cmake -B build -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

      - name: Build all targets
        run: |
          cd apps/plugin
          cmake --build build --config Release -j$(sysctl -n hw.ncpu)

      - name: List all artefacts
        run: find apps/plugin/build -name "*.vst3" -o -name "*.component" -o -name "*.app" | head -20

      - name: Package plugins
        run: |
          mkdir -p artifacts
          # Find and copy the VST3 bundle (it's a directory on macOS)
          find apps/plugin/build -name "Ghost Session.vst3" -type d | head -1 | while read dir; do
            cp -r "$dir" artifacts/
          done
          # Find and copy AU if it exists
          find apps/plugin/build -name "Ghost Session.component" -type d | head -1 | while read dir; do
            cp -r "$dir" artifacts/
          done
          ls -laR artifacts/

      - name: Upload VST3 Plugin
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-Session-VST3-macOS
          path: artifacts/
